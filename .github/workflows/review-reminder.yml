name: Review Reminder

on:
  pull_request:
    types: [synchronize]

jobs:
  check-review-freshness:
    name: Review Freshness
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - name: Check if Claude review is stale
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const sha = pr.head.sha;

            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const claudeReviews = reviews.data.filter(r => r.user.login === 'claude[bot]');

            if (claudeReviews.length === 0) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state: 'success',
                context: 'Review Freshness',
                description: 'Waiting for initial Claude review',
              });
              return;
            }

            const lastReview = claudeReviews[claudeReviews.length - 1];
            const lastReviewDate = new Date(lastReview.submitted_at);

            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const commitsAfterReview = commits.data.filter(c =>
              new Date(c.commit.committer.date) > lastReviewDate
            );

            if (commitsAfterReview.length === 0) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state: 'success',
                context: 'Review Freshness',
                description: 'Claude review is up to date',
              });
              return;
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: 'pending',
              context: 'Review Freshness',
              description: `${commitsAfterReview.length} commit(s) since last Claude review — consider re-review`,
            });

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });

            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('<!-- REVIEW_REMINDER -->')
            );

            const body = [
              `<!-- REVIEW_REMINDER -->`,
              `**Review reminder:** ${commitsAfterReview.length} commit(s) pushed since the last Claude review.`,
              ``,
              `Consider requesting a re-review before merging:`,
              `\`@claude please re-review this PR\``,
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
