name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        env:
          PUBLIC_SUPABASE_URL: https://example.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: placeholder
          PUBLIC_ADMIN_SECRET: placeholder
        run: pnpm run check

      - name: Unit tests
        env:
          PUBLIC_SUPABASE_URL: https://example.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: placeholder
          PUBLIC_ADMIN_SECRET: placeholder
        run: pnpm test

      - name: Playwright spec parse check
        env:
          PUBLIC_SUPABASE_URL: https://example.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: placeholder
          PUBLIC_ADMIN_SECRET: placeholder
        run: pnpm exec playwright test --list

      - name: Smoke build
        env:
          PUBLIC_SUPABASE_URL: https://example.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: placeholder
          PUBLIC_ADMIN_SECRET: placeholder
        run: pnpm run build
