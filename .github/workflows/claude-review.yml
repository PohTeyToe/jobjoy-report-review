name: Claude PR Review

on:
  pull_request:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

env:
  REVIEW_PROMPT: |
    You are a senior staff-level code reviewer. Analyze the provided PR for code quality,
    maintainability, security, performance, reliability, and readability. Produce a prioritized,
    actionable report.

    **Project:** jobjoy-report-review — standalone Vercel-deployed SvelteKit SPA for reviewing
    6 JobJoy Sample 1 report design variants via click-to-drop pin annotations. Supabase
    `design_review` schema for persistence. No auth — localStorage name + URL-secret admin gate.

    **Architecture:**
    - SvelteKit 2 + Svelte 5 + TypeScript, Tailwind v4 (CSS-first, NO tailwind.config.js)
    - adapter-static, deployed to Vercel at jobjoy.vercel.app sibling project
    - `@supabase/supabase-js` talks to schema `design_review` in the shared JobJoy Supabase
    - pnpm 9 monorepo-root-style; whole repo is the frontend
    - Vitest (unit) + Playwright (E2E) tests

    **Key Files:**
    - `src/routes/` — SvelteKit pages (variant viewer, admin dashboard, threads)
    - `src/lib/` — shared components, supabase client, variant loader
    - `scripts/sync-variants.ts` — clones `PohTeyToe/jobjoy-design-experiments` and stages
      variant HTML into `static/variants/`. MUST run before `pnpm build`.
    - `static/variants/` — generated, gitignored variant output
    - `tests/unit/` + `tests/e2e/` — test suites

    **Conventions:**
    - Tailwind v4 CSS-first (no `tailwind.config.js`, use `@import "tailwindcss"` + `@theme`)
    - No padded markdown tables — use minimum separator `|-|-|`, never `|---|---|`
    - No emoji in code or docs
    - Prefer minimal LOC — fewer lines beats clever abstractions
    - `execFileSync` always, `execSync` never (shell injection risk)
    - Svelte 5 runes (`$state`, `$derived`, `$effect`) — NOT legacy `export let`

    **Context & Expectations:**
    - Assume production constraints: correctness > security > reliability > performance > readability
    - Prefer explicitness and small composable units over cleverness
    - Respect project conventions unless they cause harm — then call it out

    **Scope of Review:**
    - Correctness: Svelte 5 rune usage, reactive graph integrity, SSR/SPA boundary
    - Type safety: strict TS, no `any`, inferred types where possible
    - Shadow DOM boundary leaks (phases 1+) — variants render in Shadow DOM; global
      styles / event listeners must not bleed in or out
    - RLS + secret exposure: `PUBLIC_*` envs only for client, `PUBLIC_ADMIN_SECRET` is a
      URL-secret gate (not crypto) — flag any true-secret usage in public code
    - Pin-coord math: percent-based coords must survive viewport resize and Shadow DOM
      content scroll; verify translateX/Y anchors
    - Accessibility: click-to-drop must have keyboard equivalent, pin markers need
      aria-label, focus management on modal threads

    **Output Format (strict):**

    **Executive Summary** (3-6 bullets)

    **Top Risks** (max 10 items), each with:
    - Title
    - Severity: [Critical | High | Medium | Low]
    - Why it matters (1-2 sentences)
    - Evidence: file paths + code excerpts
    - Recommended fix: concrete steps or code changes

    **Quick Wins** (short list of easy fixes)

    **Non-Blocking Suggestions** (future improvements)

    **Style & Constraints:**
    - Be specific: reference files and line ranges exactly
    - Provide minimal working code snippets for fixes
    - Prefer small, incremental changes; avoid large rewrites unless critical

    Rate the PR: APPROVE, REQUEST_CHANGES, or COMMENT.

    **How to post your review:**
    - Use `gh pr comment` to post top-level review feedback
    - Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to highlight specific code issues inline
    - Only post GitHub comments — do not submit review text as messages

  ASSIST_PROMPT: >-
    You are a helpful code assistant for jobjoy-report-review. Stack: SvelteKit 2 + Svelte 5
    + TypeScript + Tailwind v4 + Vitest + Playwright, adapter-static to Vercel, Supabase
    schema `design_review`. Key files: `scripts/sync-variants.ts` (variant HTML extraction),
    `src/lib/variants.ts` (variant loader), `src/lib/supabase.ts` (client), `README.md`
    (stack + dev commands). Tests: vitest unit in `tests/unit/`, Playwright E2E in `tests/e2e/`.
    Answer the commenter's question directly. Be specific with file paths and line numbers.
    Keep responses concise. Use `gh pr comment` to post your response.

jobs:
  # ── Haiku classifier: decides if @claude comment needs review or assist ──
  # Uses Claude CLI with OAuth token — no separate ANTHROPIC_API_KEY needed
  classify:
    if: >-
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    outputs:
      intent: ${{ steps.classify.outputs.intent }}
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - id: classify
        name: Classify intent with Haiku via Claude CLI
        uses: actions/github-script@v7
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        with:
          script: |
            // Safe: execFileSync does not use a shell, so comment body
            // cannot cause command injection even if it contains shell metacharacters.
            const { execFileSync } = require('child_process');
            const comment = context.payload.comment.body;
            const prompt = [
              'Classify this GitHub PR comment into exactly one word — "review" or "assist".',
              '- "review" = the commenter wants a full code review of the PR',
              '- "assist" = the commenter wants help, has a question, or wants a specific task done',
              '',
              'Comment:',
              comment,
              '',
              'Respond with one word only.'
            ].join('\n');

            try {
              const result = execFileSync('claude', [
                '--model', 'claude-haiku-4-5-20251001',
                '--print',
                prompt
              ], {
                encoding: 'utf-8',
                timeout: 30000,
                env: { ...process.env }
              }).trim().toLowerCase();

              const intent = result.startsWith('review') ? 'review' : 'assist';
              core.setOutput('intent', intent);
              core.info(`Classified as: ${intent}`);
            } catch (err) {
              core.warning(`Classification failed: ${err.message}. Defaulting to assist.`);
              core.setOutput('intent', 'assist');
            }

  # ── Automatic review on PR open/reopen ──
  auto-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            ${{ env.REVIEW_PROMPT }}
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Read,Glob,Grep"

  # ── @claude comment classified as review ──
  claude-review:
    needs: classify
    if: needs.classify.outputs.intent == 'review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: '@claude'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            ${{ env.REVIEW_PROMPT }}
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Read,Glob,Grep"

  # ── @claude comment classified as assist ──
  claude-assist:
    needs: classify
    if: needs.classify.outputs.intent == 'assist'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: '@claude'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}

            ${{ env.ASSIST_PROMPT }}
          claude_args: |
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Read,Glob,Grep"

  # ── @claude in review (inline) comments ──
  claude-review-assist:
    if: >-
      github.event_name == 'pull_request_review_comment' &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: '@claude'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            ${{ env.ASSIST_PROMPT }}
          claude_args: |
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Read,Glob,Grep"
